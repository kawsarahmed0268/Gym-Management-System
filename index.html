<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Management System - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: #1f1f1f; border-radius: 8px; border-bottom: 4px solid #00adb5; }
        h1 { color: #00adb5; font-size: 28px; }
        
        /* Login Screen Style */
        #login-screen { max-width: 400px; margin: 100px auto; background: #1f1f1f; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #eeeeee; }
        .form-group input { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #3d3d3d; color: white; border-radius: 4px; }
        
        /* Dashboard Screen Style */
        #dashboard-screen { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        /* Action Card Styling */
        .card { background: #1f1f1f; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #2d2d2d; transition: 0.3s; }
        .card:hover { border-color: #00adb5; transform: translateY(-5px); }
        .card h3 { margin-bottom: 15px; color: #eeeeee; }
        
        /* Buttons Style */
        button { width: 100%; padding: 12px; background: #00adb5; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #007c82; }
        button.logout-btn { background: #ff2e63; margin-top: 20px; }
        button.logout-btn:hover { background: #c71f48; }

        /* Output Box Styling */
        #output-box { background: #1f1f1f; padding: 20px; border-radius: 8px; border-left: 5px solid #00adb5; min-height: 100px; white-space: pre-line; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen">
        <h2 style="text-align: center; margin-bottom: 20px; color: #00adb5;">Gym System Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter 'admin'">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter '1234'">
        </div>
        <button onclick="handleLogin()">Login System</button>
    </div>

    <div id="dashboard-screen">
        <header>
            <h1>GYM MANAGEMENT SYSTEM DASHBOARD</h1>
            <p style="color: #bbb; margin-top: 5px;">Logged in as Admin | Active Session</p>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Member Control</h3>
                <button onclick="executeAction('Add Member')">Add New Member</button>
            </div>
            <div class="card">
                <h3>Database View</h3>
                <button onclick="executeAction('Show Members')">Show Members</button>
            </div>
            <div class="card">
                <h3>Trainers Setup</h3>
                <button onclick="executeAction('Add Trainer')">Add Trainer</button>
            </div>
            <div class="card">
                <h3>Health Tools</h3>
                <button onclick="calculateBMI()">Calculate BMI</button>
            </div>
            <div class="card">
                <h3>Accounting</h3>
                <button onclick="executeAction('Record Payment')">Record Payment</button>
            </div>
            <div class="card">
                <h3>Log Book</h3>
                <button onclick="executeAction('Member Check-In')">Member Check-In</button>
            </div>
        </div>

        <h3 style="margin-bottom: 10px; color: #00adb5;">Console Log Output Window:</h3>
        <div id="output-box">Welcome to the central command node. Select an option from above...</div>

        <button class="logout-btn" onclick="handleLogout()">Logout System</button>
    </div>

</div>

<script>
    // System Variables
    let memberList = [];

    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(u === 'admin' && p === '1234') {
            alert('Access Granted! Welcome Boss.');
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
        } else {
            alert('ERROR: Access Denied! Wrong Username or Password.');
        }
    }

    function handleLogout() {
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('output-box').innerText = "Logged out successfully.";
    }

    function executeAction(actionName) {
        const output = document.getElementById('output-box');
        
        if(actionName === 'Add Member') {
            let id = prompt("Enter Member ID:");
            if(!id) return;
            let name = prompt("Enter Name:");
            let age = prompt("Enter Age:");
            let phone = prompt("Enter Phone:");
            
            memberList.push({id, name, age, phone});
            output.innerText = `[SUCCESS] Member added successfully!\nID: ${id}\nName: ${name}\nAge: ${age}\nPhone: ${phone}`;
        } 
        else if(actionName === 'Show Members') {
            if(memberList.length === 0) {
                output.innerText = "Database is empty! No records found.";
                return;
            }
            let data = "=== Gym Active Members List ===\n";
            memberList.forEach(m => {
                data += `ID: ${m.id} | Name: ${m.name} | Age: ${m.age} | Phone: ${m.phone}\n`;
            });
            output.innerText = data;
        }
        else {
            output.innerText = `[LOG] ${actionName} process triggered successfully inside HTML environment.`;
        }
    }

    function calculateBMI() {
        const output = document.getElementById('output-box');
        let h = prompt("Enter Height (cm):");
        let w = prompt("Enter Weight (kg):");
        
        if(h && w) {
            let heightInMeters = h / 100;
            let bmi = w / (heightInMeters * heightInMeters);
            let cat = "";
            
            if (bmi < 18.5) cat = "Underweight";
            else if (bmi < 25) cat = "Normal";
            else if (bmi < 30) cat = "Overweight";
            else cat = "Obese";

            output.innerText = `--- BMI Result ---\nBMI Value: ${bmi.toFixed(2)}\nCategory : ${cat}`;
        }
    }
</script>
</body>
</html>
